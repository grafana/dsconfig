name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -count=1 -race ./...
      - name: Vet
        run: go vet ./...

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - name: Typecheck
        run: yarn tsc --noEmit
      - name: Test
        run: yarn test

  json-schema:
    name: JSON Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate JSON Schema syntax
        run: |
          python3 -c 'import json; s=json.load(open("schema/schema.json")); assert "definitions" in s; print("schema.json: valid")'

      - name: Validate example files
        shell: bash
        run: |
          count=0
          for f in schema/examples/*.schema.json; do
            python3 -c "import json,sys; d=json.load(open(sys.argv[1])); [d[k] for k in ('schemaVersion','pluginType','pluginName','fields')]; assert len(d['fields'])>0; print(sys.argv[1]+': OK')" "$f"
            count=$((count + 1))
          done
          echo "Validated $count example files"
          test "$count" -ge 5 || { echo "Expected >= 5 examples, found $count"; exit 1; }
